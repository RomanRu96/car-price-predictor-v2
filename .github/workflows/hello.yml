name: CI Check
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачай код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установи Python 3.9
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # 3. Кэширование зависимостей

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 3.1 Установи зависимости из requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Проверь, что app.py импортируется без ошибок
      - name: Check app.py
        run: python -c "import streamlit; import pandas; import catboost; print('✅ Все библиотеки на месте')"

      # 5. Установка flake8 (линтинг(автокорректор) кода)
      - name: Install linter
        run: pip install flake8
        
      # 6. запуск flake8 с выбранными флагами count, select и тп.
      - name: Run code check
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      # 7. Проверь, что app.py запускается без ошибок (10 секунд)
      - name: Run app.py check
        run: timeout 10s python app.py || true




      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
